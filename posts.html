<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos - Igreja Sem Nome</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container header-inner">
            <a href="index.html" class="logo">Igreja Sem Nome</a>
            <nav class="nav" id="nav">
                <ul class="nav-list">
                    <li><a href="index.html" class="nav-link">Início</a></li>
                    <li><a href="posts.html" class="nav-link active">Eventos</a></li>
                    <li><a href="oracao.html" class="nav-link">Oração</a></li>
                    <li><a href="sobre.html" class="nav-link">Sobre</a></li>
                </ul>
            </nav>
            <button class="hamburger" id="hamburger" aria-label="Abrir menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <section class="eventos" style="padding-top: 80px;">
        <h2>Nossos Eventos e Publicações</h2>
        <div class="grid" id="postGrid"></div>
    </section>

    <footer class="footer">
        <div class="social">
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
        </div>
        <p>&copy; 2026 Igreja Sem Nome</p>
    </footer>

    <script src="js/app.js"></script>
    <script>
    (function() {
        var hamburger = document.getElementById('hamburger');
        var nav = document.getElementById('nav');
        if (hamburger && nav) {
            hamburger.addEventListener('click', function() {
                nav.classList.toggle('open');
                hamburger.classList.toggle('open');
            });
            document.addEventListener('click', function(e) {
                if (!nav.contains(e.target) && !hamburger.contains(e.target)) {
                    nav.classList.remove('open');
                    hamburger.classList.remove('open');
                }
            });
        }
    })();
    </script>
    <!-- RADIO PLAYER FIXO -->
    <div style="position:fixed;bottom:24px;left:24px;z-index:9999;">
        <script type="text/javascript" src="https://hosted.muses.org/mrp.js"></script>
        <script type="text/javascript">
        MRP.insert({
            "url":"https://stream.zeno.fm/2lakgfphuy7tv",
            "lang":"pt",
            "codec":"mp3",
            "volume":92,
            "autoplay":true,
            "forceHTML5":true,
            "jsevents":true,
            "buffering":0,
            "title":"Radio Igreja",
            "welcome":"Bem Vindos",
            "wmode":"transparent",
            "skin":"scradio",
            "width":160,
            "height":100
        });
        </script>
    </div>
</body>
</html>
