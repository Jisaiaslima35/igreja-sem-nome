<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Igreja Sem Nome - Mural de Oração</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" integrity="sha512-Fo3rlrZj/k7ujTnHg4CGR2D7kSs0wLAsAy08k/2p3qM4y1P8r6r/bL5H/Z/fN4i6p0r6jW+M+y2M+0Q2/f5A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="oracao-page">
    <!--
      Este é o arquivo HTML da página de oração (oracao.html).
      Edite este arquivo para alterar o conteúdo e a estrutura do mural de oração.
    -->
    <header class="main-header">
        <div class="container">
            <a href="index.html" class="logo">Igreja Sem Nome</a>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Início</a></li>
                    <li><a href="posts.html">Eventos</a></li>
                    <li><a href="oracao.html" class="active">Oração</a></li>
                    <li><a href="sobre.html">Sobre</a></li>
                </ul>
            </nav>
            <div class="hamburger-menu">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </header>

    <main>
        <section class="mural-oracao">
            <div class="container">
                <h2>Mural de Oração</h2>
                <form id="oracao-form">
                    <div>
                        <label for="nome">Seu Nome:</label>
                        <input type="text" id="nome" name="nome" required>
                    </div>
                    <div>
                        <label for="pedido">Seu Pedido de Oração:</label>
                        <textarea id="pedido" name="pedido" required></textarea>
                    </div>
                    <button type="submit" class="btn">Enviar Pedido</button>
                </form>

                <h3>Pedidos Recentes</h3>
                <div class="oracao-cards">
                    <!-- Pedidos de oração serão carregados aqui via JavaScript -->
                </div>
                <button id="clear-prayers-btn" class="clear-prayers-btn">Limpar Pedidos (Admin)</button>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="container">
            <div class="social-links">
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
            </div>
            <p>&copy; 2026 Igreja Sem Nome. Todos os direitos reservados. | Endereço: Rua da Fé, 123 - Cidade da Graça</p>
        </div>
    </footer>

    <script src="js/app.js"></script>

    <!--End of Tawk.to Script-->
</body>
</html>
